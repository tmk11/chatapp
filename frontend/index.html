<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="color-scheme" content="dark light" />
    <title>Secure Chat</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="auth-screen" id="auth-screen" aria-labelledby="auth-title">
        <div class="card auth-card">
          <p class="eyebrow">Secure Chat</p>
          <h1 id="auth-title">Login or sign up</h1>
          <p class="muted">Create an account, then make a room and start chatting.</p>

          <div class="tabs" role="tablist" aria-label="Authentication mode">
            <button class="tab active" type="button" data-mode="login" role="tab" aria-selected="true">Login</button>
            <button class="tab" type="button" data-mode="register" role="tab" aria-selected="false">Sign up</button>
          </div>

          <form id="auth-form" class="stacked-form">
            <label>
              Phone number
              <input id="phone" name="phone" type="tel" placeholder="+15550001111" autocomplete="tel" required />
            </label>
            <label id="display-name-row" class="hidden">
              Display name
              <input id="display-name" name="displayName" type="text" placeholder="Alice" autocomplete="name" />
            </label>
            <label>
              Password
              <input id="password" name="password" type="password" minlength="12" placeholder="At least 12 characters" autocomplete="current-password" required />
            </label>
            <button class="primary-button" type="submit" id="auth-submit">Login</button>
          </form>
        </div>
      </section>

      <section class="app-screen hidden" id="app-screen" aria-label="Chat workspace">
        <header class="topbar card">
          <div>
            <p class="eyebrow">Rooms</p>
            <h1>Chat rooms</h1>
          </div>
          <div class="user-actions">
            <div class="user-chip">
              <span class="avatar" id="avatar">U</span>
              <div>
                <strong id="user-name">User</strong>
                <span id="user-phone">+10000000000</span>
              </div>
            </div>
            <button class="ghost-button" type="button" id="logout-button">Logout</button>
          </div>
        </header>

        <div class="workspace">
          <aside class="card rooms-panel">
            <div class="section-header">
              <h2>Your rooms</h2>
              <button class="ghost-button small" type="button" id="refresh-rooms-button">Refresh</button>
            </div>

            <form id="room-form" class="room-form">
              <label>
                New room name
                <input id="room-name" type="text" maxlength="80" placeholder="Family chat" required />
              </label>
              <button class="secondary-button" type="submit" id="create-room-button">Create room</button>
            </form>

            <div class="room-list" id="room-list" aria-live="polite">
              <div class="empty-state">No rooms yet. Create one to begin.</div>
            </div>
          </aside>

          <section class="card chat-panel" aria-labelledby="room-title">
            <div class="chat-placeholder" id="chat-placeholder">
              <div class="empty-icon" aria-hidden="true">💬</div>
              <h2>Select or create a room</h2>
              <p class="muted">Messages appear after you connect to a room.</p>
            </div>

            <div class="chat-area hidden" id="chat-area">
              <div class="section-header chat-header">
                <div>
                  <p class="eyebrow">Active room</p>
                  <h2 id="room-title">Room</h2>
                </div>
                <span class="status-pill" id="socket-status">Disconnected</span>
              </div>

              <div class="messages" id="messages" role="log" aria-live="polite"></div>

              <form id="message-form" class="message-form">
                <input id="message-input" type="text" maxlength="4096" placeholder="Write a message..." autocomplete="off" disabled />
                <button class="primary-button" type="submit" id="send-button" disabled>Send</button>
              </form>
            </div>
          </section>
        </div>
      </section>
    </main>

    <div class="toast-region" id="toast-region" aria-live="polite" aria-atomic="true"></div>
    <script src="./app.js" type="module"></script>
  </body>
</html>
