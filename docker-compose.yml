services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    environment:
      APP_HOST: 0.0.0.0
      APP_PORT: 8080
      JWT_SECRET: change-me-use-a-32-byte-random-secret-in-production
      JWT_TTL_SECONDS: 3600
      FRONTEND_DIR: /app/frontend
      DATABASE_URL: postgres://chatapp:chatapp@postgres:5432/chatapp
      RUST_LOG: secure_chat_backend=debug,tower_http=info
    ports:
      - "8080:8080"
    depends_on:
      - postgres
      - redis
      - nats

  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: chatapp
      POSTGRES_PASSWORD: chatapp
      POSTGRES_DB: chatapp
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:8-alpine
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  nats:
    image: nats:2-alpine
    command: ["-js"]
    ports:
      - "4222:4222"
      - "8222:8222"

volumes:
  postgres_data:
  redis_data:
